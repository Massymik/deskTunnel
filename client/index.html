<!doctype html>
<html lang="pl-PL">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Client</title>
  </head>

  <body>
    <div id="contextMenu">
      <div>Kopiuj nazwę</div>
      <div>Odśwież</div>
    </div>

    <div class="codeEditor">
      <div class="block windowTools"></div>

      <div class="block toolbarTop"></div>

      <div class="mainArea">
        <div class="block toolbarSide"></div>

        <div class="block fileExplorer">
          <div class="folderHeader">
            <div class="folderName">RemoteAccesTool</div>
            <img src="./res/arrowRight.svg" onclick="openAllFolders()" />
          </div>
          <line></line>
          <contents></contents>
        </div>

        <div class="editorArea">
          <div class="block openedFiles">
            <!-- <div class="file selectedFile">
              <div class="filename">main.cpp</div>
              <img src="./res/reject.svg" />
            </div> -->
          </div>

          <div class="block code">
            <div id="monacoEditor"></div>
          </div>
        </div>
      </div>
    </div>
  </body>

  <script src="./src/contextMenu.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.53.0/min/vs/loader.min.js"></script>
  <script src="./src/editor.js"></script>
  <script src="./src/websocket.js"></script>
</html>
